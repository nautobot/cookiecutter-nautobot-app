---
name: "Prepare Release"
on: # yamllint disable-line rule:truthy rule:comments
  workflow_dispatch:
    inputs:
      bump_rule:
        description: "Select the version bump type"
        required: true
        default: "patch"
        type: "choice"
        options:
          - "prerelease"
          - "patch"
          - "minor"
          - "major"
      target_branch:
        description: "Create the release from this branch (default: main)."
        required: true
        default: "main"
      date:
        description: "Date of the release YYYY-MM-DD (defaults to today's date in the US Eastern TZ)."
        required: false
        default: ""

jobs:
  prepare-release:
    permissions:
      contents: "write"
      pull-requests: "write"
    name: "Prepare Release"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v4"
        with:
          # If target_branch is 'main', use 'develop' as the source branch. Otherwise, the source and target branch are the same.
          ref: "{% raw %}${{ github.event.inputs['target_branch'] == 'main' && 'develop' || github.event.inputs['target_branch'] }}{% endraw %}"
          fetch-depth: 0  # Fetch all history for git tags

      - name: "Setup environment"
        uses: "networktocode/gh-action-setup-poetry-environment@v6"
        with:
          poetry-version: "2.1.3"
          poetry-install-options: "--with dev"

      - name: "Validate Branch and Tags"
        run: |
          # 1. Verify branch exists
          if ! git rev-parse --verify origin/{% raw %}${{ github.event.inputs.target_branch }}{% endraw %} > /dev/null 2>&1; then
            echo "Error: Branch {% raw %}${{ github.event.inputs.target_branch }}{% endraw %} does not exist."
            exit 1
          fi

          # 2. Try to get the previous version tag
          # If it fails (no tags), get the hash of the first commit
          if PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null); then
            echo "PREVIOUS_TAG=$PREV_TAG" >> $GITHUB_ENV
            echo "Found previous tag: $PREV_TAG"
          else
            # Fallback to the first commit in the repository
            FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD)
            echo "PREVIOUS_TAG=$FIRST_COMMIT" >> $GITHUB_ENV
            echo "No tags found. Falling back to initial commit: $FIRST_COMMIT"
          fi

      - name: "Determine New Version"
        id: "versioning"
        run: |
          # Perform the bump based on the user input
          poetry version {% raw %}${{ github.event.inputs.bump_rule }}{% endraw %}

          # Capture the New version string for use in other steps
          NEW_VER=$(poetry version --short)
          echo "NEW_VERSION=$NEW_VER" >> $GITHUB_ENV
          echo "RELEASE_BRANCH=release/$NEW_VER" >> $GITHUB_ENV

      - name: "Set Date Variable"
        run: |
          if [ -z "{% raw %}${{ github.event.inputs.date }}{% endraw %}" ]; then
            RELEASE_DATE=$(TZ=America/New_York date +%Y-%m-%d)
          else
            RELEASE_DATE="{% raw %}${{ github.event.inputs.date }}{% endraw %}"
          fi
          echo "RELEASE_DATE=$RELEASE_DATE" >> $GITHUB_ENV

      - name: "Create Release Branch"
        env:
          GITHUB_TOKEN: "{% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}"
        run: |
          git config user.name "{% raw %}${{ github.actor }}{% endraw %}"
          git config user.email "{% raw %}${{ github.actor }}{% endraw %}@users.noreply.github.com"

          # Ensure release branch doesn't already exist
          if git rev-parse --verify origin/{% raw %}${{ env.RELEASE_BRANCH }}{% endraw %} > /dev/null 2>&1; then
            echo "Error: Release branch {% raw %}${{ env.RELEASE_BRANCH }}{% endraw %} already exists."
            exit 1
          fi

          # Create a new branch for the release
          git checkout -b "{% raw %}${{ env.RELEASE_BRANCH }}{% endraw %}"

      - name: "Regenerate poetry.lock"
        run: "poetry lock --regenerate"

      - name: "Generate Github Release Notes"
        env:
          GH_TOKEN: "{% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}"
        run: |
          # 1. Get Towncrier Draft
          TOWNCRIER_NOTES=$(poetry run towncrier build --version "{% raw %}${{ env.NEW_VERSION }}{% endraw %}" --date "{% raw %}${{ env.RELEASE_DATE }}{% endraw %}" --draft)

          # 2. Call GitHub API to generate raw notes
          RAW_GH_NOTES=$(gh api /repos/{% raw %}${{ github.repository }}{% endraw %}/releases/generate-notes \
            -f tag_name="v{% raw %}${{ env.NEW_VERSION }}{% endraw %}" \
            -f target_commitish="{% raw %}${{ github.event.inputs['target_branch'] == 'main' && 'develop' || github.event.inputs['target_branch'] }}{% endraw %}" \
            -f previous_tag_name="{% raw %}${{ env.PREVIOUS_TAG }}{% endraw %}" --jq '.body')

          # 3. Parse usernames (Regex match)
          # We use grep to find "@user" patterns, sort, and uniq them
          USERNAMES=$(echo "$RAW_GH_NOTES" | grep -oP 'by @\K[a-zA-Z0-9-]+' | sort -u | grep -vE 'dependabot|nautobot-bot|github-actions' || true)

          # 4. Format the Contributors section
          CONTRIBUTORS_SECTION="## Contributors"
          for user in $USERNAMES; do
            CONTRIBUTORS_SECTION="$CONTRIBUTORS_SECTION"$'\n'"* @$user"
          done

          # 5. Extract the "Full Changelog" or "New Contributors" part
          # Using awk to grab everything from '## New Contributors' or '**Full Changelog**' to the end
          GH_FOOTER=$(echo "$RAW_GH_NOTES" | awk '/## New Contributors/ || /\*\*Full Changelog\*\*/ {found=1} found {print}')
          if [ -z "$GH_FOOTER" ]; then
            GH_FOOTER=$(echo "$RAW_GH_NOTES" | sed -n '/**Full Changelog**/,$p')
          fi

          # 6. Combine everything
          FINAL_NOTES="$TOWNCRIER_NOTES"$'\n\n'"$CONTRIBUTORS_SECTION"$'\n\n'"$GH_FOOTER"

          # 7. Save to a temporary file to avoid shell argument length limits
          echo "$FINAL_NOTES" > ../consolidated_notes.md

      - name: "Generate App Release Notes and update mkdocs.yml"
        run: "poetry run inv generate-release-notes --version '{% raw %}${{ env.NEW_VERSION }}{% endraw %}' --date '{% raw %}${{ env.RELEASE_DATE }}{% endraw %}'"

      - name: "Commit Changes and Push"
        run: |
          # Add all changes (pyproject.toml, poetry.lock, etc.)
          git add .
          git commit -m "prepare release v{% raw %}${{ env.NEW_VERSION }}{% endraw %}"
          git push origin "{% raw %}${{ env.RELEASE_BRANCH }}{% endraw %}"

      - name: "Create Pull Request"
        env:
          GH_TOKEN: "{% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}"
        run: |
          gh pr create \
            --title "Release v{% raw %}${{ env.NEW_VERSION }}{% endraw %}" \
            --body-file "../consolidated_notes.md" \
            --base "{% raw %}${{ github.event.inputs.target_branch }}{% endraw %}" \
            --head "{% raw %}${{ env.RELEASE_BRANCH }}{% endraw %}"

      - name: "Create Draft Release"
        env:
          GH_TOKEN: "{% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}"
        run: |
          if [[ "{% raw %}${{ github.event.inputs.bump_rule }}{% endraw %}" == "prerelease" ]]; then
            RELEASE_FLAGS="--prerelease"
          elif [[ "{% raw %}${{ github.event.inputs.target_branch }}{% endraw %}" == "main" ]]; then
            RELEASE_FLAGS="--latest"
          else
            RELEASE_FLAGS="--latest=false"
          fi

          gh release create "v{% raw %}${{ env.NEW_VERSION }}{% endraw %}" \
            --draft \
            $RELEASE_FLAGS \
            --title "v{% raw %}${{ env.NEW_VERSION }}{% endraw %} - {% raw %}${{ env.RELEASE_DATE }}{% endraw %}" \
            --notes-file "../consolidated_notes.md" \
            --target "{% raw %}${{ github.event.inputs.target_branch }}{% endraw %}"
